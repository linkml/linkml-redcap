name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Lint with ruff
        run: poetry run ruff check src tests

      - name: Validate LinkML schemas
        run: |
          for schema in \
            src/linkml_redcap/data_dictionary/schema/redcap_data_dictionary.yaml \
            src/linkml_redcap/record/schema/redcap_record.yaml; do
            echo "== $schema =="
            poetry run linkml-lint --ignore-warnings "$schema"
            poetry run gen-json-schema "$schema" > /dev/null
            poetry run gen-pydantic "$schema" > /dev/null
          done

      - name: Run tests
        run: poetry run pytest --cov=linkml_redcap --cov-report=term-missing
