# Configuration for https://github.com/adrienverge/yamllint

extends: default

# Specify files to ignore.
ignore:
  # LinkML schema files may not conform to yamllint rules (long lines, imports).
  - src/linkml_redcap/data_dictionary/schema/*.yaml
  - src/linkml_redcap/record/schema/*.yaml

rules:
  document-start: disable  # Don't check if document has a start marker (---).
  line-length:
    max: 88
    level: warning
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  new-lines: disable  # Don't check for type of new line characters.
  truthy:
    # Allow the GitHub Actions "on:" key (otherwise flagged as a truthy value).
    check-keys: false
